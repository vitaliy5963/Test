<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google-adsense-account" content="ca-pub-5252606552651648">
<title>ICraftPe key system</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5252606552651648" crossorigin="anonymous"></script>
<style>
body { background:#111; color:#fff; font-family:Arial, sans-serif; text-align:center; padding:100px 20px; }
h1 { color:#00ff30; }
p { max-width:700px; margin:30px auto; line-height:1.6; font-size:17px; }
.tab-bar { display:flex; justify-content:center; gap:20px; margin-bottom:30px; border-bottom:1px solid #333; padding-bottom:10px; }
.tab-button { background:transparent; color:#aaa; font-size:18px; padding:10px 30px; border-radius:8px; cursor:pointer; transition:0.2s; border:none; font-weight:bold; }
.tab-button.active { background:#00ff30; color:#000; }
.tab-button:not(.active):hover { background:#333; color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
.contact-email { font-size:20px; background:#1e1e1e; display:inline-block; padding:15px 30px; border-radius:16px; margin-top:20px; border:1px solid #00ff30; }
.contact-email a { color:#00ff30; text-decoration:none; }
</style>
</head>
<body>
<h1>ICraftPe key system:</h1>

<div class="tab-bar">
  <button id="tab-about-btn" class="tab-button active">About</button>
  <button id="tab-contact-btn" class="tab-button">Contact us</button>
</div>

<div id="about-tab" class="tab-content active">
  <p>This is a standart page you'll get if you won't enter an additional parameter into the URL. Please, edit the URL if you want to access any other page.</p>
</div>

<div id="contact-tab" class="tab-content">
  <h2 style="color:#00ff30;">Contact us:</h2>
  <div class="contact-email">
    📧 <a href="mailto:icraftpestore@gmail.com">icraftpestore@gmail.com</a>
  </div>
</div>

<script>
  const aboutBtn = document.getElementById("tab-about-btn");
  const contactBtn = document.getElementById("tab-contact-btn");
  const aboutTab = document.getElementById("about-tab");
  const contactTab = document.getElementById("contact-tab");

  function switchTab(tab) {
    if (tab === "about") {
      aboutTab.classList.add("active");
      contactTab.classList.remove("active");
      aboutBtn.classList.add("active");
      contactBtn.classList.remove("active");
    } else if (tab === "contact") {
      contactTab.classList.add("active");
      aboutTab.classList.remove("active");
      contactBtn.classList.add("active");
      aboutBtn.classList.remove("active");
    }
  }

  aboutBtn.onclick = () => switchTab("about");
  contactBtn.onclick = () => switchTab("contact");
</script>

<script>
(adsbygoogle = window.adsbygoogle || []).push({
  google_ad_client: "ca-pub-5252606552651648",
  enable_page_level_ads: true
});
</script>
</body>
</html>
