<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Key system</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5252606552651648" crossorigin="anonymous"></script>
<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px 12px;
  margin: 0;
}
h1 {
  font-size: clamp(24px, 6vw, 36px);
  margin-bottom: 20px;
}
p {
  font-size: clamp(14px, 4vw, 16px);
  line-height: 1.5;
}
button {
  padding: 12px 24px;
  font-size: clamp(14px, 4vw, 16px);
  border-radius: 40px;
  background: #00FF30;
  color: #000;
  cursor: pointer;
  font-weight: bold;
  border: none;
  margin: 8px 0;
  width: auto;
  min-width: 160px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.discord-btn {
  background: #5865F2;
  color: #fff;
}
.discord-btn svg {
  width: 20px;
  height: 20px;
  fill: white;
}
.button-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-top: 20px;
}
.timer-label {
  margin-top: 5px;
  font-size: clamp(14px, 4vw, 16px);
  color: #ffaa00;
  font-weight: bold;
}
.key-label {
  font-size: clamp(16px, 5vw, 20px);
  margin: 10px 0;
  word-break: break-all;
}
@media (max-width: 550px) {
  body {
    padding: 15px 10px;
  }
  button {
    width: 90%;
    max-width: 280px;
  }
}
</style>
</head>
<body>
<h1>Key system</h1>
<div id="mainContent"></div>

<script>
(function() {
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx--OgNP1wF1d1gHtbAy7fFs7vVaB1BpfGiz-KD9D5e61vKssaTtYCcSa3y_IDHAfuv3w/exec";
  const JUST2EARN_API = "https://just2earn.com/api";
  const API_KEY = "88cf35e854d80b20aa97506d0b88dfb67186cdf7";
  const STORAGE_TEMP_KEY = "icraftpe_temp_key";
  const STORAGE_EXPIRY = "icraftpe_temp_expiry";
  const STORAGE_SHORT_URL = "icraftpe_short_url";
  const STORAGE_FINAL_KEY = "icraftpe_final_key";
  const STORAGE_FINAL_EXPIRY = "icraftpe_final_expiry";
  const ONE_HOUR_MS = 60 * 60 * 1000;
  const TWENTY_FOUR_HOURS_MS = 24 * 60 * 60 * 1000;

  const urlParams = new URLSearchParams(window.location.search);
  const incomingTempKey = urlParams.get("temporary_key");
  const container = document.getElementById("mainContent");

  let timerInterval = null;
  let finalKeyTimerInterval = null;

  const discordSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.86.68,1.75,1.36,2.66,2a68.42,68.42,0,0,1-10.87,5.18,77.7,77.7,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22C129.24,52.42,122.09,29.17,107.7,8.07ZM42.45,65.69c-3.5,0-6.53-3.22-6.53-7.18s2.71-7.18,6.53-7.18,6.53,3.22,6.53,7.18-2.71,7.18-6.53,7.18Zm42.24,0c-3.5,0-6.53-3.22-6.53-7.18s2.71-7.18,6.53-7.18,6.53,3.22,6.53,7.18-2.71,7.18-6.53,7.18Z"/></svg>';

  function randomAlias(length) {
    let result = "";
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    for (let i = 0; i < length; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  function isTempValid() {
    const expiry = localStorage.getItem(STORAGE_EXPIRY);
    if (!expiry) return false;
    return Date.now() < parseInt(expiry, 10);
  }

  function isFinalKeyValid() {
    const expiry = localStorage.getItem(STORAGE_FINAL_EXPIRY);
    if (!expiry) return false;
    return Date.now() < parseInt(expiry, 10);
  }

  function getStoredTempKey() {
    return localStorage.getItem(STORAGE_TEMP_KEY);
  }

  function storeTempKey(key, expiryMs) {
    localStorage.setItem(STORAGE_TEMP_KEY, key);
    localStorage.setItem(STORAGE_EXPIRY, (Date.now() + expiryMs).toString());
  }

  function storeShortUrl(url) {
    localStorage.setItem(STORAGE_SHORT_URL, url);
  }

  function getStoredShortUrl() {
    return localStorage.getItem(STORAGE_SHORT_URL);
  }

  function storeFinalKey(key, expiryMs) {
    localStorage.setItem(STORAGE_FINAL_KEY, key);
    localStorage.setItem(STORAGE_FINAL_EXPIRY, (Date.now() + expiryMs).toString());
  }

  function getStoredFinalKey() {
    return localStorage.getItem(STORAGE_FINAL_KEY);
  }

  function clearFinalKeyData() {
    localStorage.removeItem(STORAGE_FINAL_KEY);
    localStorage.removeItem(STORAGE_FINAL_EXPIRY);
  }

  function clearTempData() {
    localStorage.removeItem(STORAGE_TEMP_KEY);
    localStorage.removeItem(STORAGE_EXPIRY);
    localStorage.removeItem(STORAGE_SHORT_URL);
  }

  async function fetchTempKey() {
    const response = await fetch(SCRIPT_URL + "?action=generate_temp");
    const data = await response.json();
    if (!data.success || !data.temporary_key) {
      throw new Error("Failed to generate temporary key");
    }
    return data.temporary_key;
  }

  async function createShortenedUrl(tempKey) {
    const destinationUrl = `https://vitaliy5963.github.io/get-key.html?temporary_key=${encodeURIComponent(tempKey)}`;
    const alias = randomAlias(20);
    const requestUrl = `${JUST2EARN_API}?api=${API_KEY}&url=${encodeURIComponent(destinationUrl)}&alias=${alias}`;
    const resp = await fetch(requestUrl, { method: "GET" });
    const json = await resp.json();
    if (json.status !== "success" || !json.shortenedUrl) {
      throw new Error("Shortening failed");
    }
    return json.shortenedUrl;
  }

  async function generateFinalKey(tempKey) {
    const body = new URLSearchParams();
    body.append("action", "generate_key");
    body.append("temporary_key", tempKey);
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString()
    });
    const data = await response.json();
    if (!data.success || !data.key) {
      throw new Error("Key generation failed");
    }
    return data.key;
  }

  async function ensureShortUrl(tempKey) {
    let shortUrl = getStoredShortUrl();
    if (!shortUrl) {
      shortUrl = await createShortenedUrl(tempKey);
      storeShortUrl(shortUrl);
    }
    return shortUrl;
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function stopFinalKeyTimer() {
    if (finalKeyTimerInterval) {
      clearInterval(finalKeyTimerInterval);
      finalKeyTimerInterval = null;
    }
  }

  function startCountdown(expiryTime, labelElement, onExpire) {
    function update() {
      const now = Date.now();
      const remaining = expiryTime - now;
      if (remaining <= 0) {
        if (labelElement && labelElement.parentNode) {
          labelElement.remove();
        }
        stopTimer();
        onExpire();
      } else {
        const totalSeconds = Math.floor(remaining / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        labelElement.textContent = `Task expires in: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }
    }
    update();
    timerInterval = setInterval(update, 1000);
  }

  function startFinalKeyCountdown(expiryTime, labelElement, onExpire) {
    function update() {
      const now = Date.now();
      const remaining = expiryTime - now;
      if (remaining <= 0) {
        if (labelElement && labelElement.parentNode) {
          labelElement.remove();
        }
        stopFinalKeyTimer();
        onExpire();
      } else {
        const totalSeconds = Math.floor(remaining / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        labelElement.textContent = `Key expires at: ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }
    }
    update();
    finalKeyTimerInterval = setInterval(update, 1000);
  }

  function addDiscordButton(parentElement) {
    const discordBtn = document.createElement("button");
    discordBtn.className = "discord-btn";
    discordBtn.innerHTML = `${discordSvg} Discord server`;
    discordBtn.onclick = () => {
      window.open("https://discord.gg/wwMqbhR8j9", "_blank");
    };
    parentElement.appendChild(discordBtn);
  }

  function showFinalKeyUI() {
    const finalKey = getStoredFinalKey();
    const finalExpiry = parseInt(localStorage.getItem(STORAGE_FINAL_EXPIRY), 10);
    if (!finalKey || isNaN(finalExpiry) || Date.now() >= finalExpiry) {
      clearFinalKeyData();
      return false;
    }
    container.innerHTML = `
      <div class="key-label">Your latest valid saved key: ${finalKey}</div>
      <div class="button-group">
        <button id="copyFinalKeyBtn">Copy key</button>
        <button id="purchaseBtn">Purchase keys</button>
      </div>
    `;
    const copyBtn = document.getElementById("copyFinalKeyBtn");
    const purchaseBtn = document.getElementById("purchaseBtn");
    if (copyBtn) {
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(finalKey);
      };
    }
    if (purchaseBtn) {
      purchaseBtn.onclick = () => {
        window.location.href = "https://vitaliy5963.github.io/";
      };
    }
    const timerLabel = document.createElement("div");
    timerLabel.className = "timer-label";
    purchaseBtn.parentNode.insertBefore(timerLabel, purchaseBtn.nextSibling);
    startFinalKeyCountdown(finalExpiry, timerLabel, () => {
      clearFinalKeyData();
      renderGetKeyPage();
    });
    addDiscordButton(purchaseBtn.parentNode);
    return true;
  }

  function renderGetKeyPage() {
    if (isFinalKeyValid()) {
      if (showFinalKeyUI()) return;
    }
    container.innerHTML = `
      <p>Click the button below to get your key for the script.</p>
      <div class="button-group">
        <button id="actionBtn">Get key</button>
        <button id="purchaseBtn">Purchase keys</button>
      </div>
    `;
    const actionBtn = document.getElementById("actionBtn");
    const purchaseBtn = document.getElementById("purchaseBtn");
    if (!actionBtn) return;

    purchaseBtn.onclick = () => {
      window.location.href = "https://vitaliy5963.github.io/";
    };

    (async () => {
      if (isTempValid()) {
        const tempKey = getStoredTempKey();
        if (tempKey) {
          try {
            const shortUrl = await ensureShortUrl(tempKey);
            actionBtn.textContent = "Open task";
            actionBtn.disabled = false;
            actionBtn.onclick = () => {
              window.open(shortUrl, "_blank");
            };
            const expiryTime = parseInt(localStorage.getItem(STORAGE_EXPIRY), 10);
            if (!isNaN(expiryTime)) {
              const timerLabel = document.createElement("div");
              timerLabel.className = "timer-label";
              purchaseBtn.parentNode.insertBefore(timerLabel, purchaseBtn.nextSibling);
              startCountdown(expiryTime, timerLabel, () => {
                clearTempData();
                renderGetKeyPage();
              });
            }
            addDiscordButton(purchaseBtn.parentNode);
            return;
          } catch (err) {
            console.error(err);
          }
        }
      }
      actionBtn.textContent = "Get key";
      actionBtn.disabled = false;
      actionBtn.onclick = async () => {
        actionBtn.disabled = true;
        actionBtn.textContent = "Processing...";
        try {
          const newTempKey = await fetchTempKey();
          storeTempKey(newTempKey, ONE_HOUR_MS);
          const shortUrl = await createShortenedUrl(newTempKey);
          storeShortUrl(shortUrl);
          actionBtn.textContent = "Open task";
          actionBtn.disabled = false;
          actionBtn.onclick = () => {
            window.open(shortUrl, "_blank");
          };
          const expiryTime = Date.now() + ONE_HOUR_MS;
          const timerLabel = document.createElement("div");
          timerLabel.className = "timer-label";
          purchaseBtn.parentNode.insertBefore(timerLabel, purchaseBtn.nextSibling);
          startCountdown(expiryTime, timerLabel, () => {
            clearTempData();
            renderGetKeyPage();
          });
          addDiscordButton(purchaseBtn.parentNode);
        } catch (err) {
          actionBtn.textContent = "Error, try again";
          actionBtn.disabled = false;
          actionBtn.onclick = () => location.reload();
        }
      };
      addDiscordButton(purchaseBtn.parentNode);
    })();
  }

  function renderKeyGeneratorPage(tempKey) {
    container.innerHTML = `
      <p>Click the button below to get your key for the script.</p>
      <div class="button-group">
        <button id="actionBtn">Get key</button>
        <button id="purchaseBtn">Purchase keys</button>
      </div>
    `;
    const actionBtn = document.getElementById("actionBtn");
    const purchaseBtn = document.getElementById("purchaseBtn");
    if (!actionBtn) return;

    purchaseBtn.onclick = () => {
      window.location.href = "https://vitaliy5963.github.io/";
    };

    actionBtn.onclick = async () => {
      actionBtn.disabled = true;
      actionBtn.textContent = "Generating the key...";
      await new Promise(r => setTimeout(r, 3000));
      try {
        const finalKey = await generateFinalKey(tempKey);
        storeFinalKey(finalKey, TWENTY_FOUR_HOURS_MS);
        const p = document.createElement("p");
        p.textContent = "Key: " + finalKey;
        container.insertBefore(p, actionBtn);
        actionBtn.textContent = "Copy key";
        actionBtn.disabled = false;
        actionBtn.onclick = () => {
          navigator.clipboard.writeText(finalKey);
        };
        clearTempData();
        stopTimer();
        renderGetKeyPage();
      } catch (err) {
        actionBtn.textContent = "Error";
        actionBtn.disabled = false;
      }
    };
    addDiscordButton(purchaseBtn.parentNode);
  }

  function validateReferrer() {
    const referrer = document.referrer;
    if (!referrer) return false;
    try {
      const url = new URL(referrer);
      return url.hostname === "go.just2earn.com";
    } catch (e) {
      return false;
    }
  }

  function validateLocalTemp(key) {
    const stored = getStoredTempKey();
    if (!stored) return false;
    if (!isTempValid()) return false;
    return stored === key;
  }

  if (incomingTempKey) {
    if (isFinalKeyValid()) {
      container.innerHTML = `<p>Error: Invalid access.</p>`;
    } else if (!validateReferrer()) {
      container.innerHTML = `<p>Error: Invalid access. Please use the task link from the previous step.</p>`;
    } else if (!validateLocalTemp(incomingTempKey)) {
      container.innerHTML = `<p>Error: Temporary key expired or invalid. Please restart the process.</p>`;
      clearTempData();
    } else {
      renderKeyGeneratorPage(incomingTempKey);
    }
  } else {
    renderGetKeyPage();
  }
})();
</script>

(adsbygoogle = window.adsbygoogle || []).push({

</script>
</body>
</html>
