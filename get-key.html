<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ICraftPe key system</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5252606552651648" crossorigin="anonymous"></script>
<style>
  body {
    background: #111;
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 60px 20px;
    margin: 0;
  }
  h1 {
    color: #00ff30;
    font-size: clamp(28px, 6vw, 42px);
    margin-bottom: 20px;
  }
  .sub {
    font-size: 18px;
    max-width: 600px;
    margin: 0 auto 30px;
    line-height: 1.5;
    color: #ccc;
  }
  button {
    background: #00ff30;
    color: #000;
    border: none;
    font-weight: bold;
    padding: 14px 32px;
    font-size: 18px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  button:active:not(:disabled) {
    transform: scale(0.96);
  }
  .error-box {
    background: #2a0a0a;
    border-left: 5px solid #ff4444;
    padding: 12px 18px;
    border-radius: 12px;
    margin: 20px auto;
    max-width: 500px;
    color: #ff8888;
  }
  .key-display {
    background: #1e1e1e;
    padding: 12px 20px;
    border-radius: 12px;
    font-family: monospace;
    font-size: 18px;
    word-break: break-all;
    display: inline-block;
    margin: 20px 0;
    border: 1px solid #00ff30;
  }
</style>
</head>
<body>
<h1>ICraftPe key system</h1>
<div id="mainContent"></div>

<script>
(function() {
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx--OgNP1wF1d1gHtbAy7fFs7vVaB1BpfGiz-KD9D5e61vKssaTtYCcSa3y_IDHAfuv3w/exec";
  const PROXY_URL = "https://corsproxy.io/";
  const JUST2EARN_API = "https://just2earn.com/api";
  const API_KEY = "88cf35e854d80b20aa97506d0b88dfb67186cdf7";
  const STORAGE_TEMP_KEY = "icraftpe_temp_key";
  const STORAGE_EXPIRY = "icraftpe_temp_expiry";
  const STORAGE_SHORT_URL = "icraftpe_short_url";
  const ONE_HOUR_MS = 60 * 60 * 1000;

  const urlParams = new URLSearchParams(window.location.search);
  const incomingTempKey = urlParams.get("temporary_key");
  const container = document.getElementById("mainContent");

  function randomAlias(length) {
    let result = "";
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    for (let i = 0; i < length; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  function isTempValid() {
    const expiry = localStorage.getItem(STORAGE_EXPIRY);
    if (!expiry) return false;
    return Date.now() < parseInt(expiry, 10);
  }

  function getStoredTempKey() {
    return localStorage.getItem(STORAGE_TEMP_KEY);
  }

  function storeTempKey(key, expiryMs) {
    localStorage.setItem(STORAGE_TEMP_KEY, key);
    localStorage.setItem(STORAGE_EXPIRY, (Date.now() + expiryMs).toString());
  }

  function storeShortUrl(url) {
    localStorage.setItem(STORAGE_SHORT_URL, url);
  }

  function getStoredShortUrl() {
    return localStorage.getItem(STORAGE_SHORT_URL);
  }

  function clearTempData() {
    localStorage.removeItem(STORAGE_TEMP_KEY);
    localStorage.removeItem(STORAGE_EXPIRY);
    localStorage.removeItem(STORAGE_SHORT_URL);
  }

  async function fetchWithProxy(url, options = {}) {
    const proxyTarget = PROXY_URL + "?" + encodeURIComponent(url);
    const response = await fetch(proxyTarget, {
      method: options.method || "GET",
      headers: options.headers || {},
      body: options.body || null
    });
    const text = await response.text();
    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error("Invalid JSON response from proxy");
    }
  }

  async function fetchTempKey() {
    const tempUrl = SCRIPT_URL + "?action=generate_temp";
    const data = await fetchWithProxy(tempUrl);
    if (!data.success || !data.temporary_key) {
      throw new Error("Failed to generate temporary key");
    }
    return data.temporary_key;
  }

  async function createShortenedUrl(tempKey) {
    const destinationUrl = `https://vitaliy5963.github.io/get-key.html?temporary_key=${encodeURIComponent(tempKey)}`;
    const alias = randomAlias(20);
    const requestUrl = `${JUST2EARN_API}?api=${API_KEY}&url=${encodeURIComponent(destinationUrl)}&alias=${alias}`;
    const resp = await fetch(requestUrl, { method: "GET" });
    const json = await resp.json();
    if (json.status !== "success" || !json.shortenedUrl) {
      throw new Error("Shortening failed");
    }
    return json.shortenedUrl;
  }

  async function generateFinalKey(tempKey) {
    const postUrl = SCRIPT_URL;
    const body = new URLSearchParams();
    body.append("action", "generate_key");
    body.append("temporary_key", tempKey);
    const proxyTarget = PROXY_URL + "?" + encodeURIComponent(postUrl);
    const response = await fetch(proxyTarget, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString()
    });
    const text = await response.text();
    const data = JSON.parse(text);
    if (!data.success || !data.key) {
      throw new Error("Key generation failed");
    }
    return data.key;
  }

  function renderGetKeyPage() {
    container.innerHTML = `
      <div class="sub">Click the button below to begin the process of getting a key for the script.</div>
      <button id="getKeyBtn">Get key</button>
    `;
    const btn = document.getElementById("getKeyBtn");
    if (!btn) return;
    btn.onclick = async () => {
      if (isTempValid()) {
        const existingShort = getStoredShortUrl();
        if (existingShort) {
          btn.textContent = "Open task";
          btn.disabled = false;
          btn.onclick = () => {
            window.open(existingShort, "_blank");
          };
          return;
        } else {
          btn.textContent = "Processing...";
          btn.disabled = true;
          try {
            const tempKey = getStoredTempKey();
            const shortUrl = await createShortenedUrl(tempKey);
            storeShortUrl(shortUrl);
            btn.textContent = "Open task";
            btn.disabled = false;
            btn.onclick = () => {
              window.open(shortUrl, "_blank");
            };
          } catch (err) {
            btn.textContent = "Error, try again";
            btn.disabled = false;
            btn.onclick = () => location.reload();
          }
        }
        return;
      }
      btn.textContent = "Processing...";
      btn.disabled = true;
      try {
        const newTempKey = await fetchTempKey();
        storeTempKey(newTempKey, ONE_HOUR_MS);
        const shortUrl = await createShortenedUrl(newTempKey);
        storeShortUrl(shortUrl);
        btn.textContent = "Open task";
        btn.disabled = false;
        btn.onclick = () => {
          window.open(shortUrl, "_blank");
        };
      } catch (err) {
        btn.textContent = "Error, try again";
        btn.disabled = false;
        btn.onclick = () => location.reload();
      }
    };
  }

  function renderKeyGeneratorPage(tempKey) {
    container.innerHTML = `
      <div class="sub">Click the button below to get your key for the script.</div>
      <button id="generateBtn">Get key</button>
    `;
    const btn = document.getElementById("generateBtn");
    if (!btn) return;
    btn.onclick = async () => {
      btn.disabled = true;
      btn.textContent = "Generating the key...";
      try {
        const finalKey = await generateFinalKey(tempKey);
        const keyElement = document.createElement("div");
        keyElement.className = "key-display";
        keyElement.innerText = `Key: ${finalKey}`;
        container.insertBefore(keyElement, btn);
        btn.textContent = "Copy key";
        btn.disabled = false;
        btn.onclick = () => {
          navigator.clipboard.writeText(finalKey);
        };
      } catch (err) {
        btn.textContent = "Error";
        btn.disabled = false;
      }
    };
  }

  function validateReferrer() {
    const referrer = document.referrer;
    if (!referrer) return false;
    try {
      const url = new URL(referrer);
      return url.hostname === "go.just2earn.com";
    } catch (e) {
      return false;
    }
  }

  function validateLocalTemp(key) {
    const stored = getStoredTempKey();
    if (!stored) return false;
    if (!isTempValid()) return false;
    return stored === key;
  }

  if (incomingTempKey) {
    if (!validateReferrer()) {
      container.innerHTML = `<div class="error-box">Invalid access. Please use the task link from the previous step.</div>`;
    } else if (!validateLocalTemp(incomingTempKey)) {
      container.innerHTML = `<div class="error-box">Temporary key expired or invalid. Please restart the process.</div>`;
      clearTempData();
    } else {
      renderKeyGeneratorPage(incomingTempKey);
    }
  } else {
    renderGetKeyPage();
  }
})();
</script>

<script>
(adsbygoogle = window.adsbygoogle || []).push({
  google_ad_client: "ca-pub-5252606552651648",
  enable_page_level_ads: true
});
</script>
</body>
</html>
