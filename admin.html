<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - ICraftPe key system</title>
<style>
body { background:#111; color:#fff; font-family:Arial, sans-serif; text-align:center; padding-top:60px; }
input, select { padding:10px; margin:5px; border-radius:8px; border:none; background:#222; color:#fff; }
button { padding:12px 25px; font-size:14px; border-radius:10px; background:#00FF30; color:#000; cursor:pointer; font-weight:bold; border:none; }
button:disabled { opacity:0.6; cursor:not-allowed; }
.msg { width:320px; margin:15px auto; padding:14px; border-radius:12px; font-weight:bold; }
.error { background:rgba(255,0,0,0.15); color:#ff4d4d; border:1px solid rgba(255,0,0,0.4); }
.success { background:rgba(0,255,0,0.15); color:#00ff66; border:1px solid rgba(0,255,0,0.4); }
.topbar { position:fixed; top:10px; right:15px; display:flex; gap:15px; align-items:center; }
.link { cursor:pointer; color:#00ff30; font-weight:bold; }
.main-container { max-width:1400px; margin:0 auto; padding:20px; }
.tab-bar { display:flex; justify-content:center; gap:20px; margin-bottom:30px; border-bottom:1px solid #333; padding-bottom:10px; }
.tab-button { background:transparent; color:#aaa; font-size:18px; padding:10px 30px; border-radius:8px; cursor:pointer; transition:0.2s; }
.tab-button.active { background:#00ff30; color:#000; }
.tab-button:not(.active):hover { background:#333; color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
.stats { display:flex; gap:30px; justify-content:center; margin-bottom:30px; flex-wrap:wrap; }
.stat-card { background:#1e1e1e; border-radius:16px; padding:20px; min-width:160px; text-align:center; border:1px solid #333; }
.stat-card h3 { margin:0 0 10px 0; color:#aaa; font-size:18px; }
.stat-card .number { font-size:36px; font-weight:bold; color:#00ff30; }
.search-area { margin:20px 0; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.search-area input { width:300px; background:#222; color:#fff; border:1px solid #444; }
.search-area button { padding:10px 20px; }
.sorting-area { margin:15px 0 10px 0; display:flex; gap:20px; justify-content:center; align-items:center; flex-wrap:wrap; }
.sorting-area label { font-weight:bold; }
.sorting-area select { padding:8px 16px; background:#222; color:#fff; border:none; border-radius:8px; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:#1a1a1a; border-radius:12px; overflow:hidden; table-layout:fixed; }
th, td { padding:12px 8px; text-align:left; border-bottom:1px solid #333; vertical-align:middle; word-break:break-all; }
th { background:#222; color:#00ff30; }
.status-active { color:#00ff30; font-weight:bold; }
.status-expired { color:#ffaa00; font-weight:bold; }
.status-blacklisted { color:#ff4444; font-weight:bold; }
.delete-btn { background:#ff4444; color:#fff; padding:6px 12px; border-radius:6px; cursor:pointer; border:none; font-weight:bold; margin:2px; }
.delete-btn:disabled { opacity:0.5; cursor:not-allowed; }
.blacklist-btn { background:#ff8800; color:#fff; padding:6px 12px; border-radius:6px; cursor:pointer; border:none; font-weight:bold; margin:2px; white-space:nowrap; }
.blacklist-btn:disabled { opacity:0.5; cursor:not-allowed; }
.remove-btn { background:#ff4444; color:#fff; padding:6px 12px; border-radius:6px; cursor:pointer; border:none; font-weight:bold; }
.remove-btn:disabled { opacity:0.5; cursor:not-allowed; }
.pagination { margin-top:20px; display:flex; gap:15px; justify-content:center; align-items:center; }
.pagination button { padding:8px 20px; }
.page-info { color:#aaa; }
.manage-section { background:#1e1e1e; border-radius:16px; padding:20px; border:1px solid #333; }
.manage-section h2 { text-align:center; margin-top:0; color:#00ff30; }
.action-select { display:flex; justify-content:center; gap:20px; margin-bottom:20px; align-items:center; }
.action-select label { font-weight:bold; }
.action-select select { padding:8px 16px; background:#222; color:#fff; border:none; border-radius:8px; }
.input-group { display:flex; justify-content:center; gap:15px; margin:15px 0; align-items:center; flex-wrap:wrap; }
.input-group input { width:250px; }
.manage-btn { background:#00ff30; margin-top:10px; }
.toggle-btn { padding:8px 20px; font-size:14px; border-radius:8px; border:none; cursor:pointer; font-weight:bold; min-width:80px; }
.toggle-on { background:#00ff30; color:#000; }
.toggle-off { background:#ff4444; color:#fff; }
</style>
</head>
<body>

<div id="loginBox">
<h1>Admin</h1>
<p>Login:</p>
<input id="login" type="text">
<p>Password:</p>
<input id="password" type="password"><br><br>
<button id="btn">Login</button>
<div id="msg"></div>
</div>

<script>
const POST_URL = "https://script.google.com/macros/s/AKfycbx--OgNP1wF1d1gHtbAy7fFs7vVaB1BpfGiz-KD9D5e61vKssaTtYCcSa3y_IDHAfuv3w/exec";

function setSession(login) {
  localStorage.setItem("admin_login", login);
  localStorage.setItem("admin_time", Date.now().toString());
}

function clearSession() {
  localStorage.removeItem("admin_login");
  localStorage.removeItem("admin_time");
}

function getSession() {
  return {
    login: localStorage.getItem("admin_login"),
    time: parseInt(localStorage.getItem("admin_time") || "0", 10)
  };
}

function showLoginScreen() {
  document.body.innerHTML =
    "<div id='loginBox'>" +
    "<h1>Admin</h1>" +
    "<p>Login:</p><input id='login' type='text'>" +
    "<p>Password:</p><input id='password' type='password'><br><br>" +
    "<button id='btn'>Login</button>" +
    "<div id='msg'></div>" +
    "</div>";

  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");

  btn.onclick = async () => {
    const login = document.getElementById("login").value;
    const password = document.getElementById("password").value;

    msg.innerHTML = "";
    btn.disabled = true;
    btn.textContent = "Logging in...";

    try {
      const res = await fetch(POST_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "action=admin_login&login=" + encodeURIComponent(login) + "&password=" + encodeURIComponent(password)
      });

      const data = await res.json();

      if (data.success) {
        setSession(login);
        startDashboard(login);
      } else {
        msg.innerHTML = "<div class='msg error'>Error: Wrong login or password.</div>";
        btn.disabled = false;
        btn.textContent = "Login";
      }
    } catch (e) {
      msg.innerHTML = "<div class='msg error'>Error: Wrong login or password.</div>";
      btn.disabled = false;
      btn.textContent = "Login";
    }
  };
}

function startDashboard(login) {
  document.body.innerHTML = "";

  const topbar = document.createElement("div");
  topbar.className = "topbar";

  const user = document.createElement("div");
  user.className = "link";
  user.textContent = "Logged in as: " + login;

  const logout = document.createElement("div");
  logout.className = "link";
  logout.textContent = "Log out";

  topbar.appendChild(user);
  topbar.appendChild(logout);

  document.body.appendChild(topbar);

  const mainDiv = document.createElement("div");
  mainDiv.className = "main-container";
  mainDiv.innerHTML = 
    "<div class='tab-bar'>" +
      "<button id='tab-keys-btn' class='tab-button active'>Keys</button>" +
      "<button id='tab-blacklist-btn' class='tab-button'>Blacklist</button>" +
      "<button id='tab-manage-btn' class='tab-button'>Management</button>" +
    "</div>" +
    "<div id='keys-tab' class='tab-content active'>" +
      "<div class='stats' id='stats-area'>" +
        "<div class='stat-card'><h3>Total keys</h3><div class='number' id='total-keys'>-</div></div>" +
        "<div class='stat-card'><h3>Active keys</h3><div class='number' id='active-keys'>-</div></div>" +
        "<div class='stat-card'><h3>Expired keys</h3><div class='number' id='expired-keys'>-</div></div>" +
      "</div>" +
      "<div class='sorting-area'>" +
        "<label>Sorting:</label>" +
        "<select id='sort-select'>" +
          "<option value='all'>All</option>" +
          "<option value='active'>Active</option>" +
          "<option value='expired'>Expired</option>" +
          "<option value='blacklisted'>Blacklisted</option>" +
          "<option value='tasks'>Task keys</option>" +
          "<option value='admin'>Admin keys</option>" +
          "<option value='customer'>Customer keys</option>" +
          "<option value='used'>Used keys</option>" +
          "<option value='unused'>Unused keys</option>" +
        "</select>" +
      "</div>" +
      "<div class='sorting-area'>" +
        "<label>Expiration sorting:</label>" +
        "<select id='exp-sort-select'>" +
          "<option value='desc' selected>Newest first</option>" +
          "<option value='asc'>Oldest first</option>" +
        "</select>" +
      "</div>" +
      "<div class='sorting-area'>" +
        "<label>Keys per page:</label>" +
        "<select id='page-size-select'>" +
          "<option value='25' selected>25</option>" +
          "<option value='50'>50</option>" +
          "<option value='100'>100</option>" +
          "<option value='250'>250</option>" +
          "<option value='500'>500</option>" +
          "<option value='1000'>1000</option>" +
        "</select>" +
      "</div>" +
      "<div class='search-area'>" +
        "<input type='text' id='search-input' placeholder='Search key or HWID...' style='width:300px;'>" +
        "<button id='search-btn'>Search</button>" +
      "</div>" +
      "<div id='keys-table-container'>" +
        "<table id='keys-table'>" +
          "<thead>" +
            "<tr>" +
              "<th style='width:22%'>HWID</th>" +
              "<th style='width:10%'>Type</th>" +
              "<th style='width:28%'>Key</th>" +
              "<th style='width:10%'>Status</th>" +
              "<th style='width:15%'>Time left</th>" +
              "<th style='width:15%'>Actions</th>" +
            "</tr>" +
          "</thead>" +
          "<tbody id='keys-tbody'></tbody>" +
        "</table>" +
      "</div>" +
      "<div class='pagination' id='pagination-controls'></div>" +
    "</div>" +
    "<div id='blacklist-tab' class='tab-content'>" +
      "<div class='search-area'>" +
        "<input type='text' id='blacklist-search-input' placeholder='Search HWID...' style='width:300px;'>" +
        "<button id='blacklist-search-btn'>Search</button>" +
      "</div>" +
      "<div id='blacklist-table-container'>" +
        "<table id='blacklist-table'>" +
          "<thead>" +
            "<tr>" +
              "<th>HWID</th>" +
              "<th>Reason</th>" +
              "<th>Status</th>" +
              "<th>Actions</th>" +
            "</tr>" +
          "</thead>" +
          "<tbody id='blacklist-tbody'></tbody>" +
        "</table>" +
      "</div>" +
      "<div class='pagination' id='blacklist-pagination-controls'></div>" +
    "</div>" +
    "<div id='manage-tab' class='tab-content'>" +
      "<div class='manage-section'>" +
        "<h2>Management</h2>" +
        "<div class='action-select'>" +
          "<label>Action:</label>" +
          "<select id='action-select'>" +
            "<option value='none'>Select action</option>" +
            "<option value='create'>Create custom key</option>" +
            "<option value='delete'>Delete key</option>" +
            "<option value='generate_multiple'>Generate multiple keys</option>" +
          '</select>' +
        "</div>" +
        "<div id='dynamic-inputs'></div>" +
        "<div id='manage-result'></div>" +
      "</div>" +
    "</div>";
  document.body.appendChild(mainDiv);

  let currentPage = 1;
  let currentSearch = "";
  let currentSort = "all";
  let currentExpSort = "desc";
  let currentPageSize = 25;
  let isLoading = false;
  let countdownInterval = null;

  let currentBlacklistPage = 1;
  let currentBlacklistSearch = "";
  let blacklistPageSize = 25;

  function stopCountdown() {
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
  }

  function startCountdown() {
    stopCountdown();
    countdownInterval = setInterval(() => {
      const now = Date.now();
      const tbody = document.getElementById("keys-tbody");
      if (!tbody) return;
      const rows = tbody.querySelectorAll("tr[data-key]");
      for (const row of rows) {
        const isBlacklisted = row.getAttribute("data-blacklisted") === "true";
        if (isBlacklisted) continue;

        const expTimeAttr = row.getAttribute("data-exp-time");
        if (!expTimeAttr) continue;
        const expTime = parseInt(expTimeAttr, 10);
        const timeLeftCell = row.querySelector(".time-left-cell");
        const statusCell = row.querySelector(".status-cell");
        if (!timeLeftCell) continue;

        if (expTime > now) {
          const diffSec = Math.floor((expTime - now) / 1000);
          const h = Math.floor(diffSec / 3600);
          const m = Math.floor((diffSec % 3600) / 60);
          const s = diffSec % 60;
          timeLeftCell.textContent = h + "h " + m + "m " + s + "s";
          if (statusCell && statusCell.classList.contains("status-expired")) {
            statusCell.textContent = "Active";
            statusCell.className = "status-active status-cell";
          }
        } else {
          const diffSec = Math.floor((now - expTime) / 1000);
          const h = Math.floor(diffSec / 3600);
          const m = Math.floor((diffSec % 3600) / 60);
          const s = diffSec % 60;
          let expiredText = "Expired";
          if (h > 0) expiredText = "-" + h + "h " + m + "m " + s + "s";
          else if (m > 0) expiredText = "-" + m + "m " + s + "s";
          else expiredText = "-" + s + "s";
          timeLeftCell.textContent = expiredText;
          if (statusCell && statusCell.classList.contains("status-active")) {
            statusCell.textContent = "Expired";
            statusCell.className = "status-expired status-cell";
          }
        }
      }
    }, 1000);
  }

  async function fetchStats() {
    const res = await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "action=get_stats"
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById("total-keys").innerText = data.total;
      document.getElementById("active-keys").innerText = data.active;
      document.getElementById("expired-keys").innerText = data.expired;
    }
  }

  async function fetchKeys(page, search, sort, expSort, pageSize) {
    if (isLoading) return;
    isLoading = true;
    const searchBtn = document.getElementById("search-btn");
    const prevBtn = document.querySelector("#pagination-controls .prev-btn");
    const nextBtn = document.querySelector("#pagination-controls .next-btn");
    if (searchBtn) searchBtn.disabled = true;
    if (prevBtn) prevBtn.disabled = true;
    if (nextBtn) nextBtn.disabled = true;
    
    const tbody = document.getElementById("keys-tbody");
    if (tbody) tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Loading...</td></tr>";

    const body = "action=get_keys&page=" + page + "&search=" + encodeURIComponent(search) + "&sort=" + sort + "&exp_sort=" + expSort + "&page_size=" + pageSize;
    const res = await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body
    });
    const data = await res.json();

    if (data.success) {
      renderTable(data.keys);
      renderPagination(data.currentPage, data.totalPages, data.totalResults);
      currentPage = data.currentPage;
      startCountdown();
    } else {
      if (tbody) tbody.innerHTML = "<tr><td colspan='6'>Failed to load keys</td></tr>";
    }

    if (searchBtn) searchBtn.disabled = false;
    if (prevBtn) prevBtn.disabled = false;
    if (nextBtn) nextBtn.disabled = false;
    isLoading = false;
  }

  function renderTable(keys) {
    const tbody = document.getElementById("keys-tbody");
    if (!keys.length) {
      tbody.innerHTML = "<tr><td colspan='6'>No keys found</td></tr>";
      return;
    }
    let html = "";
    for (const k of keys) {
      let statusClass = k.status === "Active" ? "status-active" : "status-expired";
      let statusText = k.status;
      let timeLeftDisplay = k.timeLeft;
      let isBlacklisted = k.blacklisted || false;

      if (isBlacklisted) {
        statusClass = "status-blacklisted";
        statusText = "Blacklisted";
        timeLeftDisplay = "Blacklisted";
      }

      const hwidDisplay = k.hwid || "Not used";
      
      const actionButtons = 
        '<button class="delete-btn" data-key="' + escapeHtml(k.key) + '">DELETE</button> ' +
        '<button class="blacklist-btn" data-key="' + escapeHtml(k.key) + '" data-hwid="' + escapeHtml(k.hwid || '') + '" data-blacklisted="' + isBlacklisted + '">' +
          (isBlacklisted ? 'WHITELIST' : 'BLACKLIST') +
        '</button>';

      html += '<tr data-key="' + escapeHtml(k.key) + '" data-exp-time="' + (k.expTime || "") + '" data-blacklisted="' + isBlacklisted + '">' +
        '<td>' + escapeHtml(hwidDisplay) + '</td>' +
        '<td>' + escapeHtml(k.type) + '</td>' +
        '<td>' + escapeHtml(k.key) + '</td>' +
        '<td class="' + statusClass + ' status-cell">' + statusText + '</td>' +
        '<td class="time-left-cell">' + escapeHtml(timeLeftDisplay) + '</td>' +
        '<td>' + actionButtons + '</td>' +
        '</tr>';
    }
    tbody.innerHTML = html;

    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const key = btn.getAttribute("data-key");
        btn.disabled = true;
        btn.textContent = "Deleting...";
        const res = await fetch(POST_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "action=admin_delete_key_by_key&key=" + encodeURIComponent(key)
        });
        const data = await res.json();
        if (data.success) {
          await fetchKeys(currentPage, currentSearch, currentSort, currentExpSort, currentPageSize);
          await fetchStats();
        } else {
          btn.disabled = false;
          btn.textContent = "DELETE";
        }
      });
    });

    document.querySelectorAll(".blacklist-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const key = btn.getAttribute("data-key");
        const hwid = btn.getAttribute("data-hwid");
        const currentlyBlacklisted = btn.getAttribute("data-blacklisted") === "true";

        if (!hwid || hwid === "Not used") {
          btn.disabled = true;
          btn.textContent = "Blacklisting...";
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = currentlyBlacklisted ? "WHITELIST" : "BLACKLIST";
          }, 800);
          return;
        }

        btn.disabled = true;
        btn.textContent = currentlyBlacklisted ? "Whitelisting..." : "Blacklisting...";

        let actionUrl = currentlyBlacklisted 
          ? "action=admin_remove_from_blacklist&hwid=" + encodeURIComponent(hwid)
          : "action=admin_blacklist_hwid&key=" + encodeURIComponent(key) + "&hwid=" + encodeURIComponent(hwid);

        const res = await fetch(POST_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: actionUrl
        });
        const data = await res.json();

        if (data.success) {
          await fetchKeys(currentPage, currentSearch, currentSort, currentExpSort, currentPageSize);
          await fetchStats();
          await fetchBlacklist(currentBlacklistPage, currentBlacklistSearch);
        } else {
          btn.disabled = false;
          btn.textContent = currentlyBlacklisted ? "WHITELIST" : "BLACKLIST";
        }
      });
    });
  }

  function renderPagination(current, total, totalResults) {
    const container = document.getElementById("pagination-controls");
    if (total <= 1 && current === 1) {
      container.innerHTML = "";
      return;
    }
    let html = "<button class='prev-btn'" + (current === 1 ? " disabled" : "") + ">Previous page</button>";
    html += "<span class='page-info'>Page " + current + " of " + total + " (" + totalResults + " results)</span>";
    html += "<button class='next-btn'" + (current === total ? " disabled" : "") + ">Next page</button>";
    container.innerHTML = html;

    const prevBtn = container.querySelector(".prev-btn");
    const nextBtn = container.querySelector(".next-btn");
    if (prevBtn && !prevBtn.disabled) {
      prevBtn.onclick = () => {
        if (currentPage > 1) {
          stopCountdown();
          fetchKeys(currentPage - 1, currentSearch, currentSort, currentExpSort, currentPageSize);
        }
      };
    }
    if (nextBtn && !nextBtn.disabled) {
      nextBtn.onclick = () => {
        if (currentPage < total) {
          stopCountdown();
          fetchKeys(currentPage + 1, currentSearch, currentSort, currentExpSort, currentPageSize);
        }
      };
    }
  }

  async function fetchBlacklist(page, search) {
    const tbody = document.getElementById("blacklist-tbody");
    if (tbody) tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Loading...</td></tr>";

    const res = await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "action=get_blacklist&page=" + page + "&search=" + encodeURIComponent(search) + "&page_size=" + blacklistPageSize
    });
    const data = await res.json();

    if (data.success) {
      renderBlacklistTable(data.hwidList);
      renderBlacklistPagination(data.currentPage, data.totalPages, data.totalResults);
    } else {
      if (tbody) tbody.innerHTML = "<tr><td colspan='4'>Failed to load blacklist</td></tr>";
    }
  }

  function renderBlacklistTable(hwidList) {
    const tbody = document.getElementById("blacklist-tbody");
    if (!hwidList.length) {
      tbody.innerHTML = "<tr><td colspan='4'>No blacklisted HWIDs found</td></tr>";
      return;
    }
    let html = "";
    for (const item of hwidList) {
      const reasonDisplay = item.reason && item.reason.trim() !== "" ? escapeHtml(item.reason) : "No reason provided";
      html += "<tr data-hwid='" + escapeHtml(item.hwid) + "'>" +
        "<td>" + escapeHtml(item.hwid) + "</td>" +
        "<td>" + reasonDisplay + "</td>" +
        "<td class='status-blacklisted'>Blacklisted</td>" +
        "<td><button class='remove-btn' data-hwid='" + escapeHtml(item.hwid) + "'>REMOVE</button></td>" +
        "</tr>";
    }
    tbody.innerHTML = html;

    document.querySelectorAll(".remove-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const hwid = btn.getAttribute("data-hwid");
        btn.disabled = true;
        btn.textContent = "Removing...";
        const res = await fetch(POST_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "action=admin_remove_from_blacklist&hwid=" + encodeURIComponent(hwid)
        });
        const data = await res.json();
        if (data.success) {
          await fetchBlacklist(currentBlacklistPage, currentBlacklistSearch);
          await fetchKeys(currentPage, currentSearch, currentSort, currentExpSort, currentPageSize);
        } else {
          btn.disabled = false;
          btn.textContent = "REMOVE";
        }
      });
    });
  }

  function renderBlacklistPagination(current, total, totalResults) {
    const container = document.getElementById("blacklist-pagination-controls");
    if (total <= 1 && current === 1) {
      container.innerHTML = "";
      return;
    }
    let html = "<button class='prev-btn'" + (current === 1 ? " disabled" : "") + ">Previous page</button>";
    html += "<span class='page-info'>Page " + current + " of " + total + " (" + totalResults + " results)</span>";
    html += "<button class='next-btn'" + (current === total ? " disabled" : "") + ">Next page</button>";
    container.innerHTML = html;

    const prevBtn = container.querySelector(".prev-btn");
    const nextBtn = container.querySelector(".next-btn");
    if (prevBtn && !prevBtn.disabled) {
      prevBtn.onclick = () => {
        if (currentBlacklistPage > 1) {
          currentBlacklistPage--;
          fetchBlacklist(currentBlacklistPage, currentBlacklistSearch);
        }
      };
    }
    if (nextBtn && !nextBtn.disabled) {
      nextBtn.onclick = () => {
        if (currentBlacklistPage < total) {
          currentBlacklistPage++;
          fetchBlacklist(currentBlacklistPage, currentBlacklistSearch);
        }
      };
    }
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === "&") return "&amp;";
      if (m === "<") return "&lt;";
      if (m === ">") return "&gt;";
      return m;
    });
  }

  const searchBtn = document.getElementById("search-btn");
  const searchInput = document.getElementById("search-input");
  if (searchBtn) {
    searchBtn.onclick = async () => {
      const searchVal = searchInput.value;
      currentSearch = searchVal;
      currentPage = 1;
      stopCountdown();
      const originalText = searchBtn.textContent;
      searchBtn.textContent = "Searching...";
      searchBtn.disabled = true;
      await fetchKeys(1, currentSearch, currentSort, currentExpSort, currentPageSize);
      await fetchStats();
      searchBtn.textContent = originalText;
      searchBtn.disabled = false;
    };
  }

  const sortSelect = document.getElementById("sort-select");
  if (sortSelect) {
    sortSelect.onchange = async () => {
      currentSort = sortSelect.value;
      currentPage = 1;
      stopCountdown();
      await fetchKeys(1, currentSearch, currentSort, currentExpSort, currentPageSize);
    };
  }

  const expSortSelect = document.getElementById("exp-sort-select");
  if (expSortSelect) {
    expSortSelect.onchange = async () => {
      currentExpSort = expSortSelect.value;
      currentPage = 1;
      stopCountdown();
      await fetchKeys(1, currentSearch, currentSort, currentExpSort, currentPageSize);
    };
  }

  const pageSizeSelect = document.getElementById("page-size-select");
  if (pageSizeSelect) {
    pageSizeSelect.onchange = async () => {
      currentPageSize = parseInt(pageSizeSelect.value, 10);
      currentPage = 1;
      stopCountdown();
      await fetchKeys(1, currentSearch, currentSort, currentExpSort, currentPageSize);
    };
  }

  const blacklistSearchBtn = document.getElementById("blacklist-search-btn");
  const blacklistSearchInput = document.getElementById("blacklist-search-input");
  if (blacklistSearchBtn) {
    blacklistSearchBtn.onclick = async () => {
      currentBlacklistSearch = blacklistSearchInput.value;
      currentBlacklistPage = 1;
      await fetchBlacklist(1, currentBlacklistSearch);
    };
  }

  (async () => {
    await Promise.all([fetchStats(), fetchKeys(1, "", "all", "desc", 25)]);
    await fetchBlacklist(1, "");
  })();

  logout.onclick = () => {
    stopCountdown();
    clearSession();
    showLoginScreen();
  };

  user.onclick = () => openPasswordPage(login);

  const tabKeysBtn = document.getElementById("tab-keys-btn");
  const tabBlacklistBtn = document.getElementById("tab-blacklist-btn");
  const tabManageBtn = document.getElementById("tab-manage-btn");
  const keysTab = document.getElementById("keys-tab");
  const blacklistTab = document.getElementById("blacklist-tab");
  const manageTab = document.getElementById("manage-tab");

  function switchTab(tab) {
    keysTab.classList.remove("active");
    blacklistTab.classList.remove("active");
    manageTab.classList.remove("active");
    tabKeysBtn.classList.remove("active");
    tabBlacklistBtn.classList.remove("active");
    tabManageBtn.classList.remove("active");

    if (tab === "keys") {
      keysTab.classList.add("active");
      tabKeysBtn.classList.add("active");
    } else if (tab === "blacklist") {
      blacklistTab.classList.add("active");
      tabBlacklistBtn.classList.add("active");
    } else if (tab === "manage") {
      manageTab.classList.add("active");
      tabManageBtn.classList.add("active");
    }
  }

  tabKeysBtn.onclick = () => switchTab("keys");
  tabBlacklistBtn.onclick = () => switchTab("blacklist");
  tabManageBtn.onclick = () => switchTab("manage");

  const actionSelect = document.getElementById("action-select");
  const dynamicDiv = document.getElementById("dynamic-inputs");
  const manageResult = document.getElementById("manage-result");

  function updateDynamicInputs() {
    const action = actionSelect.value;
    dynamicDiv.innerHTML = "";

    if (action === "create") {
      dynamicDiv.innerHTML = 
        '<div class="input-group">' +
          '<label>Key type:</label>' +
          '<select id="key-type">' +
            '<option value="Admin" selected>Admin</option>' +
            '<option value="Customer">Customer</option>' +
          '</select>' +
        '</div>' +
        '<div class="input-group">' +
          '<label>Key:</label>' +
          '<input type="text" id="custom-key">' +
        '</div>' +
        '<div class="input-group">' +
          '<label>Expiration time (seconds):</label>' +
          '<input type="number" id="exp-seconds">' +
        '</div>' +
        '<div class="input-group">' +
          '<button id="create-key-btn" class="manage-btn">Create</button>' +
        '</div>';
      const createBtn = document.getElementById("create-key-btn");
      if (createBtn) {
        createBtn.onclick = async () => {
          const keyInput = document.getElementById("custom-key");
          const expInput = document.getElementById("exp-seconds");
          const typeSelect = document.getElementById("key-type");
          const key = keyInput ? keyInput.value.trim() : "";
          const expSec = expInput ? parseInt(expInput.value, 10) : NaN;
          const selectedType = typeSelect ? typeSelect.value : "Admin";
          if (!key) {
            manageResult.innerHTML = "<div class='msg error'>Error: Key field cannot be empty.</div>";
            return;
          }
          if (isNaN(expSec) || expSec <= 0) {
            manageResult.innerHTML = "<div class='msg error'>Error: Enter a valid positive number of seconds.</div>";
            return;
          }
          createBtn.disabled = true;
          createBtn.textContent = "Creating...";
          const res = await fetch(POST_URL, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "action=admin_create_key&key=" + encodeURIComponent(key) + "&expiration_seconds=" + expSec + "&key_type=" + encodeURIComponent(selectedType)
          });
          const data = await res.json();
          if (data.success) {
            manageResult.innerHTML = "<div class='msg success'>Key created successfully.</div>";
            if (keyInput) keyInput.value = "";
            if (expInput) expInput.value = "";
            await fetchStats();
            await fetchKeys(currentPage, currentSearch, currentSort, currentExpSort, currentPageSize);
          } else {
            manageResult.innerHTML = "<div class='msg error'>" + (data.message || "Failed to create key") + "</div>";
          }
          createBtn.disabled = false;
          createBtn.textContent = "Create";
        };
      }
    } else if (action === "delete") {
      dynamicDiv.innerHTML = 
        '<div class="input-group">' +
          '<label>Key:</label>' +
          '<input type="text" id="delete-key">' +
        '</div>' +
        '<div class="input-group">' +
          '<button id="delete-key-btn" class="manage-btn">Delete</button>' +
        '</div>';
      const deleteBtn = document.getElementById("delete-key-btn");
      if (deleteBtn) {
        deleteBtn.onclick = async () => {
          const keyInput = document.getElementById("delete-key");
          const key = keyInput ? keyInput.value.trim() : "";
          if (!key) {
            manageResult.innerHTML = "<div class='msg error'>Error: Key field cannot be empty.</div>";
            return;
          }
          deleteBtn.disabled = true;
          deleteBtn.textContent = "Deleting...";
          const res = await fetch(POST_URL, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "action=admin_delete_key_by_key&key=" + encodeURIComponent(key)
          });
          const data = await res.json();
          if (data.success) {
            manageResult.innerHTML = "<div class='msg success'>Key deleted successfully.</div>";
            if (keyInput) keyInput.value = "";
            await fetchStats();
            await fetchKeys(currentPage, currentSearch, currentSort, currentExpSort, currentPageSize);
          } else {
            manageResult.innerHTML = "<div class='msg error'>" + (data.message || "Failed to delete key") + "</div>";
          }
          deleteBtn.disabled = false;
          deleteBtn.textContent = "Delete";
        };
      }
    } else if (action === "generate_multiple") {
      dynamicDiv.innerHTML = 
        '<div class="input-group">' +
          '<label>Key type:</label>' +
          '<select id="key-type">' +
            '<option value="Admin" selected>Admin</option>' +
            '<option value="Customer">Customer</option>' +
          '</select>' +
        '</div>' +
        '<div class="input-group">' +
          '<label>Custom prefix:</label>' +
          '<button id="prefix-toggle" class="toggle-btn toggle-off">OFF</button>' +
        '</div>' +
        '<div class="input-group" id="prefix-input-group" style="display:none;">' +
          '<input type="text" id="custom-prefix" maxlength="20">' +
        '</div>' +
        '<div class="input-group">' +
          '<label>Amount of keys (max 1000):</label>' +
          '<input type="number" id="keys-amount" min="1" max="1000">' +
        '</div>' +
        '<div class="input-group">' +
          '<label>Expiration time (seconds):</label>' +
          '<input type="number" id="exp-seconds">' +
        '</div>' +
        '<div class="input-group">' +
          '<button id="generate-multiple-btn" class="manage-btn">Generate</button>' +
        '</div>';
      const toggleBtn = document.getElementById("prefix-toggle");
      const prefixGroup = document.getElementById("prefix-input-group");
      const prefixInput = document.getElementById("custom-prefix");
      let isOn = false;

      toggleBtn.onclick = () => {
        isOn = !isOn;
        if (isOn) {
          toggleBtn.textContent = "ON";
          toggleBtn.classList.remove("toggle-off");
          toggleBtn.classList.add("toggle-on");
          prefixGroup.style.display = "flex";
        } else {
          toggleBtn.textContent = "OFF";
          toggleBtn.classList.remove("toggle-on");
          toggleBtn.classList.add("toggle-off");
          prefixGroup.style.display = "none";
          if (prefixInput) prefixInput.value = "";
        }
      };

      const genBtn = document.getElementById("generate-multiple-btn");
      if (genBtn) {
        genBtn.onclick = async () => {
          const useCustom = isOn;
          const prefix = prefixInput ? prefixInput.value.trim() : "";
          const amount = document.getElementById("keys-amount") ? parseInt(document.getElementById("keys-amount").value, 10) : NaN;
          const expSec = document.getElementById("exp-seconds") ? parseInt(document.getElementById("exp-seconds").value, 10) : NaN;
          const typeSelect = document.getElementById("key-type");
          const selectedType = typeSelect ? typeSelect.value : "Admin";

          if (useCustom && !prefix) {
            manageResult.innerHTML = "<div class='msg error'>Error: Custom prefix cannot be empty.</div>";
            return;
          }
          if (isNaN(amount) || amount < 1 || amount > 1000) {
            manageResult.innerHTML = "<div class='msg error'>Error: Amount must be between 1 and 1000.</div>";
            return;
          }
          if (isNaN(expSec) || expSec <= 0) {
            manageResult.innerHTML = "<div class='msg error'>Error: Enter valid expiration time.</div>";
            return;
          }

          genBtn.disabled = true;
          genBtn.textContent = "Generating...";

          const body = "action=admin_generate_multiple" +
            "&custom_prefix=" + encodeURIComponent(useCustom ? prefix : "") +
            "&amount=" + amount +
            "&expiration_seconds=" + expSec +
            "&key_type=" + encodeURIComponent(selectedType);

          const res = await fetch(POST_URL, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body
          });
          const data = await res.json();

          if (data.success) {
            let msgHtml = "<div class='msg success'>Successfully generated " + data.count + " keys.</div>";
            manageResult.innerHTML = msgHtml;
            await fetchStats();
            await fetchKeys(currentPage, currentSearch, currentSort, currentExpSort, currentPageSize);
          } else {
            manageResult.innerHTML = "<div class='msg error'>" + (data.message || "Failed to generate keys") + "</div>";
          }
          genBtn.disabled = false;
          genBtn.textContent = "Generate";
        };
      }
    }
  }

  if (actionSelect) {
    actionSelect.addEventListener("change", updateDynamicInputs);
    updateDynamicInputs();
  }
}

function openPasswordPage(login) {
  document.body.innerHTML = "";

  const topbar = document.createElement("div");
  topbar.className = "topbar";

  const user = document.createElement("div");
  user.className = "link";
  user.textContent = "Logged in as: " + login;

  const back = document.createElement("div");
  back.className = "link";
  back.textContent = "Back to dashboard";

  const logout = document.createElement("div");
  logout.className = "link";
  logout.textContent = "Log out";

  topbar.appendChild(back);
  topbar.appendChild(user);
  topbar.appendChild(logout);

  document.body.appendChild(topbar);

  const box = document.createElement("div");
  box.style.marginTop = "120px";

  box.innerHTML =
    "<h1>Change password</h1>" +
    "<p>Current password:</p><input id='cpass' type='password'>" +
    "<p>New password:</p><input id='npass' type='password'>" +
    "<p>New password (confirm):</p><input id='npass2' type='password'><br><br>" +
    "<button id='save'>Save password</button>" +
    "<div id='msg'></div>";

  document.body.appendChild(box);

  const save = document.getElementById("save");
  const msg = document.getElementById("msg");

  logout.onclick = () => {
    clearSession();
    showLoginScreen();
  };

  user.onclick = () => startDashboard(login);
  back.onclick = () => startDashboard(login);

  save.onclick = async () => {
    msg.innerHTML = "";

    const c = document.getElementById("cpass").value;
    const n = document.getElementById("npass").value;
    const n2 = document.getElementById("npass2").value;

    save.disabled = true;
    save.textContent = "Saving...";

    if (/^[0-9]/.test(n)) {
      msg.innerHTML = "<div class='msg error'>Error: New password cannot start with a number.</div>";
      save.disabled = false;
      save.textContent = "Save password";
      return;
    }

    try {
      const res = await fetch(POST_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "action=change_password&login=" + encodeURIComponent(login) +
          "&current=" + encodeURIComponent(c) +
          "&new=" + encodeURIComponent(n) +
          "&confirm=" + encodeURIComponent(n2)
      });

      const data = await res.json();

      if (data.success) {
        msg.innerHTML = "<div class='msg success'>Password changed successfully. Logging out...</div>";
        save.disabled = true;
        setTimeout(() => {
          clearSession();
          showLoginScreen();
        }, 3000);
      } else {
        msg.innerHTML = "<div class='msg error'>" + (data.message || "Failed to change password") + "</div>";
        save.disabled = false;
        save.textContent = "Save password";
      }
    } catch (e) {
      msg.innerHTML = "<div class='msg error'>Request failed.</div>";
      save.disabled = false;
      save.textContent = "Save password";
    }
  };
}

btn.onclick = async () => {
  const login = document.getElementById("login").value;
  const password = document.getElementById("password").value;

  msg.innerHTML = "";
  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    const res = await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "action=admin_login&login=" + encodeURIComponent(login) + "&password=" + encodeURIComponent(password)
    });

    const data = await res.json();

    if (data.success) {
      setSession(login);
      startDashboard(login);
    } else {
      msg.innerHTML = "<div class='msg error'>Error: Wrong login or password.</div>";
      btn.disabled = false;
      btn.textContent = "Login";
    }
  } catch (e) {
    msg.innerHTML = "<div class='msg error'>Error: Wrong login or password.</div>";
    btn.disabled = false;
    btn.textContent = "Login";
  }
};

(function autoLogin(){
  const s = getSession();
  if (s.login && s.time) {
    const diff = Date.now() - s.time;
    if (diff < 86400000) {
      startDashboard(s.login);
    } else {
      clearSession();
      showLoginScreen();
    }
  }
})();
